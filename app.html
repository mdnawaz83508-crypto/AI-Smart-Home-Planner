<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Home Planner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏠 AI Smart Home Planner</h1>

<div class="ai-boy">
🤖 Hi! I am your AI Home Designer.<br><br>
Tell me your room details, budget and style.
I will create a smart home plan for you.
</div>

<p>Enter your room details:</p>

<input id="room" placeholder="Room size (example: 12x15 ft)">

<input id="budget" placeholder="Budget (example: 50000)">

<input id="style" placeholder="Design style (Modern/Luxury/Simple)">

<button onclick="generateDesign()">Generate Design</button>

<h2>🏡 AI Suggestion:</h2>

<div id="result">
Your design will appear here.
</div>

<script src="script.js"></script>

</body>
</html>
