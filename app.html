<!DOCTYPE html>
<html>
<head>
<title>AI Smart Home Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏠 AI Smart Home Planner</h1>

<div class="ai-boy">
🤖 Hello! I am your AI Home Designer.<br>
Enter details and I will create ideas for you.
</div>


<h2>🏡 Create Home Design</h2>

<input id="room" placeholder="Room size (example: 12x15 ft)">

<input id="budget" placeholder="Budget (example: 50000)">

<input id="style" placeholder="Style (Modern/Luxury/Simple)">

<button onclick="generateDesign()">
Generate Design
</button>


<div id="result">
Your AI design will appear here.
</div>



<h2>🎬 AI Video Creator</h2>

<input id="videoIdea" placeholder="Enter video idea">

<button onclick="generateVideo()">
Generate Video Idea
</button>


<div id="videoResult">
Your video idea will appear here.
</div>



<script src="script.js"></script>

</body>
</html>
