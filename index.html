<!DOCTYPE html>
<html>
<head>
<title>AI Smart Home Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🏠 AI Smart Home Planner</h1>

<p>Enter your room details:</p>

<input id="room" placeholder="Room size or type">

<input id="budget" placeholder="Budget">

<input id="style" placeholder="Design style">

<button onclick="generateDesign()">Generate Design</button>

<h2>AI Suggestion:</h2>

<div id="result">
Your design will appear here.
</div>


<h2>🏠 House Design Prompt</h2>

<textarea id="housePrompt" placeholder="Describe your dream house"></textarea>

<button onclick="createPrompt()">Create AI Prompt</button>

<p id="promptResult"></p>


<h2>🖼 Google Images</h2>

<input id="imageSearch" placeholder="Search house images">

<button onclick="openImages()">Search Images</button>

</div>


<script src="script.js"></script>

</body>
</html>
